name: cli-build

on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: video-link-debugger-linux-x64
          - target: bun-linux-x64-baseline
            os: ubuntu-latest
            artifact: video-link-debugger-linux-x64-baseline
          - target: bun-linux-x64-modern
            os: ubuntu-latest
            artifact: video-link-debugger-linux-x64-modern
          - target: bun-linux-arm64
            os: ubuntu-24.04-arm
            artifact: video-link-debugger-linux-arm64
          - target: bun-windows-x64
            os: windows-latest
            artifact: video-link-debugger-windows-x64.exe
          - target: bun-windows-x64-baseline
            os: windows-latest
            artifact: video-link-debugger-windows-x64-baseline.exe
          - target: bun-windows-x64-modern
            os: windows-latest
            artifact: video-link-debugger-windows-x64-modern.exe
          - target: bun-windows-arm64
            os: windows-11-arm
            artifact: video-link-debugger-windows-arm64.exe
          - target: bun-darwin-x64
            os: macos-13
            artifact: video-link-debugger-darwin-x64
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: video-link-debugger-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Compile
        shell: bash
        run: bun build --compile --target=${{ matrix.target }} ./src/index.ts --outfile "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create commit-hash prerelease
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.sha }}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "${{ github.sha }}" \
            --notes "Automated build for commit ${{ github.sha }}" \
            --prerelease \
            dist/*

      - name: Upload to release-please release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --clobber
